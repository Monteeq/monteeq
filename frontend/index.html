<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <link rel="icon" type="image/png" href="/favicon.png" />
  <link rel="apple-touch-icon" href="/favicon.png" />
  <meta name="theme-color" content="#000000" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <!-- Preconnect to Google Fonts for faster DNS/TLS -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />

  <!-- Non-blocking font load — only Outfit (primary) + Inter (body) -->
  <link rel="stylesheet"
    href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;800&family=Inter:wght@400;500;700&display=swap"
    media="print" onload="this.media='all'" />
  <noscript>
    <link rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;800&family=Inter:wght@400;500;700&display=swap" />
  </noscript>

  <title>Monteeq</title>
</head>

<body>
  <div id="root"></div>
  <script type="module" src="/src/main.jsx"></script>

  <!-- AdSense deferred — loads after page is interactive -->
  <script>
    if (typeof requestIdleCallback === 'function') {
      requestIdleCallback(function () {
        var s = document.createElement('script');
        s.src = 'https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=' + (window.__ADSENSE_ID || '');
        s.async = true;
        s.crossOrigin = 'anonymous';
        document.head.appendChild(s);
      });
    } else {
      setTimeout(function () {
        var s = document.createElement('script');
        s.src = 'https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=' + (window.__ADSENSE_ID || '');
        s.async = true;
        s.crossOrigin = 'anonymous';
        document.head.appendChild(s);
      }, 3000);
    }
  </script>
</body>

</html>
