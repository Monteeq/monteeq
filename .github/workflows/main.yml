name: CI/CD Pipeline

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          
      - name: Install Linting Tools
        run: |
          pip install flake8
          
      - name: Lint Backend
        run: |
          # stop the build if there are Python syntax errors or undefined names
          flake8 backend --count --select=E9,F63,F7,F82 --show-source --statistics
          # exit-zero treats all errors as warnings.
          flake8 backend --count --exit-zero --max-complexity=10 --max-line-length=127 --statistics

  frontend-build:
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Frontend Dependencies
        run: |
          cd frontend
          npm install

      - name: Build Frontend
        run: |
          cd frontend
          npm run build

  deploy-backend:
    runs-on: ubuntu-latest
    needs: lint
    # Only deploy on pushes to main (not on PRs)
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          lfs: true

      - name: Check HF Token Presence
        env:
          TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          if [ -z "$TOKEN" ]; then
            echo "=========================================================================="
            echo "❌ ERROR: HF_TOKEN is empty or missing in GitHub Secrets!"
            echo "Please go to Repository Settings -> Secrets and variables -> Actions"
            echo "and ensure a Repository Secret named HF_TOKEN is added with your write token."
            echo "=========================================================================="
            exit 1
          else
            echo "✅ HF_TOKEN secret is found in workflow environment."
          fi

      - name: Push backend to Hugging Face Space
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          # Configure git
          git config --global user.email "ci@monteeq.com"
          git config --global user.name "Monteeq CI"
          git lfs install

          # Clone the HF Space repo
          git clone https://user:${HF_TOKEN}@huggingface.co/spaces/MonteeqOrg/backend hf-space || { echo "Git clone failed"; exit 1; }

          # Sync backend/ contents into the Space (delete removed files too)
          rsync -av --delete \
            --exclude='.git/' \
            --exclude='.venv/' \
            --exclude='__pycache__/' \
            --exclude='*.pyc' \
            --exclude='.env' \
            --exclude='scratch/' \
            --exclude='demo_assets/' \
            --exclude='static/uploads/' \
            --exclude='static/defaults/' \
            --exclude='migrate_s3_to_hf.py' \
            backend/ hf-space/

          # Commit and push if anything changed
          cd hf-space || { echo "Directory not found"; exit 1; }
          git add -A
          git diff --staged --quiet && echo "No changes to deploy" && exit 0
          git commit -m "🚀 Deploy from GitHub @ ${{ github.sha }}

          Triggered by: ${{ github.actor }}
          Message: ${{ github.event.head_commit.message }}"
          git push
          echo "✅ Deployed to https://huggingface.co/spaces/MonteeqOrg/backend"


  deploy-video-service:
    runs-on: ubuntu-latest
    needs: lint
    # Only deploy on pushes to main (not on PRs)
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          lfs: true

      - name: Check HF Token Presence
        env:
          TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          if [ -z "$TOKEN" ]; then
            echo "=========================================================================="
            echo "❌ ERROR: HF_TOKEN is empty or missing in GitHub Secrets!"
            echo "Please go to Repository Settings -> Secrets and variables -> Actions"
            echo "and ensure a Repository Secret named HF_TOKEN is added with your write token."
            echo "=========================================================================="
            exit 1
          else
            echo "✅ HF_TOKEN secret is found in workflow environment."
          fi

      - name: Push video service to Hugging Face Space
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          # Configure git
          git config --global user.email "ci@monteeq.com"
          git config --global user.name "Monteeq CI"
          git lfs install

          # Clone the HF Space repo for video-service (readme)
          git clone https://user:${HF_TOKEN}@huggingface.co/spaces/MonteeqOrg/readme hf-video-space || { echo "Git clone failed"; exit 1; }

          # Sync video-service/ contents into the Space (delete removed files too)
          rsync -av --delete \
            --exclude='.git/' \
            --exclude='target/' \
            --exclude='.env' \
            --exclude='*.jpg' \
            --exclude='deploy_hf.sh' \
            video-service/ hf-video-space/

          # Commit and push if anything changed
          cd hf-video-space || { echo "Directory not found"; exit 1; }
          git add -A
          git diff --staged --quiet && echo "No changes to deploy" && exit 0
          git commit -m "🚀 Deploy from GitHub @ ${{ github.sha }}

          Triggered by: ${{ github.actor }}
          Message: ${{ github.event.head_commit.message }}"
          git push
          echo "✅ Deployed to https://huggingface.co/spaces/MonteeqOrg/readme"





